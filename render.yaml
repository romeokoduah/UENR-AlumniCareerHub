# Render blueprint — one-click deploy the entire stack.
#
# Usage: push this file to GitHub, then click the "Deploy to Render" button
# in README.md (or visit https://render.com/deploy and paste the repo URL).
#
# What gets created:
#   1. uenr-career-hub-api  — Node web service running Express on /api/*
#   2. uenr-career-hub-web  — Static site serving the React/Vite frontend
#   3. A 1 GB persistent disk mounted at /data on the API service for
#      the SQLite DB, uploaded images, and landing-page content.
#
# After deploy you only need to set ANTHROPIC_API_KEY manually in the
# dashboard (marked sync: false). Everything else is wired automatically.

services:
  # ========== BACKEND (Express + Prisma + SQLite) ==========
  - type: web
    name: uenr-career-hub-api
    runtime: node
    # Starter plan ($7/mo) is required for persistent disks on Render.
    # The app uses SQLite + file-based uploads, so persistence is mandatory.
    # If you'd rather stay free, upgrade the stack to Render Postgres +
    # an external blob store (Cloudinary, S3) — see DEPLOYMENT.md.
    plan: starter
    rootDir: server
    buildCommand: |
      npm install
      npx prisma generate
      mkdir -p /data/content /data/uploads
      DATABASE_URL="file:/data/dev.db" npx prisma db push --skip-generate --accept-data-loss
      DATABASE_URL="file:/data/dev.db" DATA_DIR=/data/content UPLOAD_DIR=/data/uploads npx tsx prisma/seed.ts
    startCommand: npx tsx src/index.ts
    healthCheckPath: /api/health
    disk:
      name: uenr-data
      mountPath: /data
      sizeGB: 1
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4000
      - key: DATABASE_URL
        value: file:/data/dev.db
      - key: UPLOAD_DIR
        value: /data/uploads
      - key: DATA_DIR
        value: /data/content
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: ANTHROPIC_MODEL
        value: claude-sonnet-4-20250514
      - key: CLIENT_ORIGIN
        fromService:
          type: web
          name: uenr-career-hub-web
          property: host

  # ========== FRONTEND (Vite + React static site) ==========
  - type: web
    name: uenr-career-hub-web
    runtime: static
    rootDir: client
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: uenr-career-hub-api
          property: host
    routes:
      # SPA rewrites — every non-asset route returns index.html so React Router
      # can handle /admin/landing, /opportunities/:id, etc. on direct load.
      - type: rewrite
        source: /*
        destination: /index.html
    headers:
      - path: /*
        name: X-Frame-Options
        value: SAMEORIGIN
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
