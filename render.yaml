# Render blueprint — one-click deploy on the FREE tier.
#
# Before clicking "Deploy to Render":
#   1. Create a free Neon Postgres project at https://console.neon.tech
#   2. Create a free Cloudinary account at https://cloudinary.com
#   3. Have your Anthropic API key ready (optional — chatbot/CV review
#      degrade gracefully without it)
#
# Usage:
#   - Click the "Deploy to Render" button in README.md
#   - When Render asks for the `sync: false` variables, paste:
#       * DATABASE_URL           = Neon *pooled* connection string
#       * DATABASE_URL_UNPOOLED  = Neon *direct* connection string
#       * CLOUDINARY_URL         = cloudinary://api_key:secret@cloud_name
#       * ANTHROPIC_API_KEY      = your Claude API key (optional)
#
# What gets created:
#   1. uenr-career-hub-api  — Node web service (free plan, no disk needed)
#   2. uenr-career-hub-web  — Static site serving the React/Vite frontend
#
# No persistent disk required: Neon stores the database, Cloudinary stores
# uploaded images, and landing-page content lives in a Postgres table.

services:
  # ========== BACKEND (Express + Prisma + Neon Postgres) ==========
  - type: web
    name: uenr-career-hub-api
    runtime: node
    plan: free
    rootDir: server
    buildCommand: |
      npm install
      npx prisma generate
      npx prisma db push --skip-generate --accept-data-loss
      npx tsx prisma/seed.ts
    startCommand: npx tsx src/index.ts
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4000
      - key: DATABASE_URL
        sync: false
      - key: DATABASE_URL_UNPOOLED
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: ANTHROPIC_MODEL
        value: claude-sonnet-4-20250514
      - key: CLOUDINARY_URL
        sync: false
      - key: CLIENT_ORIGIN
        fromService:
          type: web
          name: uenr-career-hub-web
          property: host

  # ========== FRONTEND (Vite + React static site) ==========
  - type: web
    name: uenr-career-hub-web
    runtime: static
    rootDir: client
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: uenr-career-hub-api
          property: host
    routes:
      # SPA rewrites — every non-asset route returns index.html so React Router
      # can handle /admin/landing, /opportunities/:id, etc. on direct load.
      - type: rewrite
        source: /*
        destination: /index.html
    headers:
      - path: /*
        name: X-Frame-Options
        value: SAMEORIGIN
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
